<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Pizarra Editorial</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#ffffff">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500&family=DM+Mono:wght@400&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/fabric.js/5.3.1/fabric.min.js"></script>
  
  <style>
    *, *::before, *::after { 
      box-sizing: border-box; 
      margin: 0; 
      padding: 0; 
    }

    :root {
      --white: #fff; 
      --gray-50: #f5f5f5; 
      --gray-100: #eeeeee; 
      --gray-200: #e0e0e0;
      --gray-400: #aaaaaa; 
      --gray-600: #666; 
      --gray-800: #222;
      --accent: #0F62FE; 
      --accent-soft: #e8f0ff; 
      --danger: #e8305a;
      --shadow-sm: 0 2px 8px rgba(0,0,0,.06); 
      --shadow-md: 0 8px 32px rgba(0,0,0,.10);
      --shadow-lg: 0 16px 48px rgba(0,0,0,.14);
      --r-sm: 8px; 
      --r-md: 12px; 
      --r-lg: 16px;
      --font: 'DM Sans', sans-serif; 
      --mono: 'DM Mono', monospace;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #fff;
      font-family: var(--font);
      -webkit-font-smoothing: antialiased;
    }

    /* ── CANVAS ── */
    #canvas-container {
      position: fixed;
      inset: 0;
      cursor: default;
      background-color: #fafafa;
      background-image: radial-gradient(circle, #d8d8d8 1px, transparent 1px);
      background-size: 28px 28px;
    }

    canvas {
      position: absolute;
      top: 0;
      left: 0;
    }

    /* ── HEADER ── */
    #header {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      height: 52px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 20px;
      background: rgba(255, 255, 255, .92);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--gray-100);
      z-index: 200;
    }

    .header-left {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .logo-mark {
      width: 28px;
      height: 28px;
      background: var(--gray-800);
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .logo-mark svg {
      width: 16px;
      height: 16px;
      fill: white;
    }

    .board-title {
      font-size: 14px;
      font-weight: 500;
      color: var(--gray-800);
      cursor: text;
      padding: 2px 6px;
      border-radius: 4px;
      border: 1px solid transparent;
      transition: border-color .15s;
    }

    .board-title:hover {
      border-color: var(--gray-200);
    }

    .board-title:focus {
      outline: none;
      border-color: var(--accent);
    }

    .header-right {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .hbtn {
      height: 32px;
      padding: 0 12px;
      border: 1px solid var(--gray-200);
      background: white;
      border-radius: var(--r-sm);
      font-family: var(--font);
      font-size: 12px;
      font-weight: 500;
      color: var(--gray-600);
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 6px;
      transition: all .15s;
    }

    .hbtn:hover {
      background: var(--gray-50);
      color: var(--gray-800);
    }

    .hbtn.primary {
      background: var(--gray-800);
      color: white;
      border-color: var(--gray-800);
    }

    .hbtn.primary:hover {
      background: #111;
    }

    .hbtn svg {
      width: 14px;
      height: 14px;
      fill: currentColor;
    }

    /* ── TOOLBAR LEFT ── */
    #toolbar-left {
      position: fixed;
      left: 20px;
      top: 50%;
      transform: translateY(-50%);
      background: rgba(255, 255, 255, .95);
      backdrop-filter: blur(12px);
      border: 1px solid var(--gray-100);
      border-radius: var(--r-lg);
      box-shadow: var(--shadow-md);
      padding: 8px 6px;
      display: flex;
      flex-direction: column;
      gap: 2px;
      z-index: 100;
    }

    .tool-btn {
      width: 40px;
      height: 40px;
      border: none;
      background: none;
      border-radius: var(--r-sm);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--gray-600);
      transition: all .15s;
      position: relative;
    }

    .tool-btn:hover {
      background: var(--gray-50);
      color: var(--gray-800);
    }

    .tool-btn.active {
      background: var(--accent-soft);
      color: var(--accent);
    }

    .tool-btn svg {
      width: 18px;
      height: 18px;
      fill: currentColor;
    }

    .tool-sep {
      width: 28px;
      height: 1px;
      background: var(--gray-100);
      margin: 4px auto;
    }

    .tool-btn::after {
      content: attr(data-tip);
      position: absolute;
      left: calc(100% + 10px);
      top: 50%;
      transform: translateY(-50%);
      background: var(--gray-800);
      color: white;
      font-family: var(--font);
      font-size: 11px;
      font-weight: 500;
      padding: 4px 8px;
      border-radius: 5px;
      white-space: nowrap;
      opacity: 0;
      pointer-events: none;
      transition: opacity .15s;
    }

    .tool-btn:hover::after {
      opacity: 1;
    }

    /* ── SHAPES POPOVER ── */
    #shapes-popover {
      position: fixed;
      left: 70px;
      z-index: 300;
      background: rgba(255, 255, 255, .98);
      backdrop-filter: blur(12px);
      border: 1px solid var(--gray-100);
      border-radius: var(--r-md);
      box-shadow: var(--shadow-lg);
      padding: 10px;
      display: none;
      flex-direction: column;
      gap: 6px;
    }

    #shapes-popover.open {
      display: flex;
    }

    .shape-row {
      display: flex;
      gap: 4px;
    }

    .shape-btn {
      width: 36px;
      height: 36px;
      border: 1px solid var(--gray-200);
      background: white;
      border-radius: 6px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all .15s;
    }

    .shape-btn:hover {
      background: var(--accent-soft);
      border-color: var(--accent);
    }

    .shape-btn svg {
      width: 18px;
      height: 18px;
      fill: var(--gray-700);
      stroke: none;
    }

    .shape-btn svg.stroked {
      fill: none;
      stroke: var(--gray-700);
      stroke-width: 2;
    }

    /* ── TOOLBAR BOTTOM ── */
    #toolbar-bottom {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(255, 255, 255, .95);
      backdrop-filter: blur(16px);
      border: 1px solid var(--gray-100);
      border-radius: var(--r-lg);
      box-shadow: var(--shadow-lg);
      padding: 8px 12px;
      display: flex;
      align-items: center;
      gap: 4px;
      z-index: 100;
    }

    .bot-btn {
      height: 36px;
      padding: 0 10px;
      border: none;
      background: none;
      border-radius: var(--r-sm);
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 6px;
      font-family: var(--font);
      font-size: 12px;
      font-weight: 500;
      color: var(--gray-600);
      white-space: nowrap;
      transition: all .15s;
    }

    .bot-btn:hover {
      background: var(--gray-50);
      color: var(--gray-800);
    }

    .bot-btn svg {
      width: 15px;
      height: 15px;
      fill: currentColor;
    }

    .bot-btn.danger:hover {
      background: #fff0f3;
      color: var(--danger);
    }

    .bot-sep {
      width: 1px;
      height: 24px;
      background: var(--gray-200);
      margin: 0 4px;
    }

    /* ── ZOOM ── */
    #zoom-indicator {
      position: fixed;
      bottom: 28px;
      right: 24px;
      display: flex;
      align-items: center;
      gap: 6px;
      background: rgba(255, 255, 255, .95);
      backdrop-filter: blur(12px);
      border: 1px solid var(--gray-100);
      border-radius: var(--r-sm);
      box-shadow: var(--shadow-sm);
      padding: 4px 10px;
      z-index: 100;
    }

    .zoom-btn {
      width: 24px;
      height: 24px;
      border: none;
      background: none;
      cursor: pointer;
      border-radius: 4px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--gray-600);
      font-size: 16px;
      line-height: 1;
      transition: background .15s;
    }

    .zoom-btn:hover {
      background: var(--gray-50);
    }

    #zoom-label {
      font-family: var(--mono);
      font-size: 11px;
      color: var(--gray-600);
      min-width: 36px;
      text-align: center;
    }

    /* ── OBJ PANEL ── */
    #obj-panel {
      position: fixed;
      right: 20px;
      top: 50%;
      transform: translateY(-50%);
      background: rgba(255, 255, 255, .97);
      backdrop-filter: blur(12px);
      border: 1px solid var(--gray-100);
      border-radius: var(--r-lg);
      box-shadow: var(--shadow-md);
      padding: 14px;
      width: 190px;
      z-index: 100;
      display: none;
      flex-direction: column;
      gap: 7px;
    }

    #obj-panel.visible {
      display: flex;
    }

    .panel-title {
      font-size: 10px;
      font-weight: 500;
      letter-spacing: .08em;
      color: var(--gray-400);
      text-transform: uppercase;
      margin-bottom: 2px;
    }

    .panel-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
    }

    .panel-label {
      font-size: 11px;
      color: var(--gray-600);
    }

    .panel-val {
      font-family: var(--mono);
      font-size: 11px;
      color: var(--gray-800);
    }

    .panel-btn {
      width: 100%;
      height: 30px;
      border: 1px solid var(--gray-200);
      background: white;
      border-radius: 6px;
      font-family: var(--font);
      font-size: 11px;
      font-weight: 500;
      color: var(--gray-700);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 5px;
      transition: all .15s;
    }

    .panel-btn:hover {
      background: var(--gray-50);
    }

    .panel-btn svg {
      width: 13px;
      height: 13px;
      fill: currentColor;
    }

    .panel-btn.danger {
      color: var(--danger);
      border-color: #fcd0da;
    }

    .panel-btn.danger:hover {
      background: #fff0f3;
    }

    /* ── TEXT FORMAT TOOLBAR ── */
    #text-toolbar {
      position: fixed;
      top: 62px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(255, 255, 255, .97);
      backdrop-filter: blur(12px);
      border: 1px solid var(--gray-100);
      border-radius: var(--r-md);
      box-shadow: var(--shadow-md);
      padding: 5px 8px;
      display: none;
      align-items: center;
      gap: 3px;
      z-index: 150;
    }

    #text-toolbar.visible {
      display: flex;
    }

    .fmt-btn {
      height: 28px;
      min-width: 28px;
      padding: 0 5px;
      border: none;
      background: none;
      border-radius: 5px;
      cursor: pointer;
      font-family: var(--font);
      font-size: 13px;
      font-weight: 500;
      color: var(--gray-600);
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all .15s;
    }

    .fmt-btn:hover {
      background: var(--gray-50);
      color: var(--gray-800);
    }

    .fmt-btn.active {
      background: var(--accent-soft);
      color: var(--accent);
    }

    .fmt-btn svg {
      width: 14px;
      height: 14px;
      fill: currentColor;
    }

    .fmt-sep {
      width: 1px;
      height: 18px;
      background: var(--gray-200);
      margin: 0 2px;
    }

    .fmt-select {
      height: 26px;
      border: 1px solid var(--gray-200);
      border-radius: 5px;
      font-family: var(--font);
      font-size: 11px;
      color: var(--gray-700);
      background: white;
      padding: 0 4px;
      cursor: pointer;
    }

    /* ── COLOR PANEL ── */
    #color-panel {
      position: fixed;
      z-index: 500;
      background: rgba(255, 255, 255, .98);
      backdrop-filter: blur(12px);
      border: 1px solid var(--gray-100);
      border-radius: var(--r-md);
      box-shadow: var(--shadow-lg);
      padding: 12px;
      display: none;
      flex-direction: column;
      gap: 8px;
      min-width: 180px;
    }

    #color-panel.open {
      display: flex;
    }

    .color-grid {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 5px;
    }

    .cp-swatch {
      width: 24px;
      height: 24px;
      border-radius: 50%;
      cursor: pointer;
      border: 2px solid transparent;
      transition: transform .15s, border-color .15s;
    }

    .cp-swatch:hover {
      transform: scale(1.15);
    }

    .cp-swatch.sel {
      border-color: var(--gray-800);
    }

    .cp-label {
      font-size: 10px;
      font-weight: 500;
      color: var(--gray-400);
      text-transform: uppercase;
      letter-spacing: .06em;
    }

    .cp-row {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .cp-custom {
      width: 26px;
      height: 26px;
      padding: 0;
      border: 1px solid var(--gray-200);
      border-radius: 4px;
      cursor: pointer;
      background: none;
    }

    /* ── LINK MODAL ── */
    #link-modal {
      position: fixed;
      inset: 0;
      z-index: 700;
      background: rgba(0, 0, 0, .4);
      display: none;
      align-items: center;
      justify-content: center;
    }

    #link-modal.open {
      display: flex;
    }

    .link-box {
      background: white;
      border-radius: var(--r-lg);
      box-shadow: var(--shadow-lg);
      padding: 24px;
      width: 360px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .link-box h3 {
      font-size: 14px;
      font-weight: 500;
      color: var(--gray-800);
    }

    .link-input {
      height: 36px;
      border: 1px solid var(--gray-200);
      border-radius: var(--r-sm);
      padding: 0 10px;
      font-family: var(--font);
      font-size: 13px;
      color: var(--gray-800);
      width: 100%;
    }

    .link-input:focus {
      outline: none;
      border-color: var(--accent);
    }

    .link-actions {
      display: flex;
      gap: 8px;
      justify-content: flex-end;
    }

    .link-btn {
      height: 34px;
      padding: 0 16px;
      border-radius: var(--r-sm);
      font-family: var(--font);
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
      border: 1px solid var(--gray-200);
      background: white;
      color: var(--gray-700);
      transition: all .15s;
    }

    .link-btn:hover {
      background: var(--gray-50);
    }

    .link-btn.primary {
      background: var(--gray-800);
      color: white;
      border-color: var(--gray-800);
    }

    .link-btn.primary:hover {
      background: #111;
    }

    /* ── CONTEXT MENU ── */
    #ctx-menu {
      position: fixed;
      z-index: 500;
      background: rgba(255, 255, 255, .98);
      backdrop-filter: blur(12px);
      border: 1px solid var(--gray-100);
      border-radius: var(--r-md);
      box-shadow: var(--shadow-lg);
      padding: 6px;
      min-width: 170px;
      display: none;
    }

    #ctx-menu.open {
      display: block;
    }

    .ctx-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 7px 10px;
      border-radius: 6px;
      font-size: 12px;
      font-weight: 500;
      color: var(--gray-700);
      cursor: pointer;
      transition: background .1s;
    }

    .ctx-item:hover {
      background: var(--gray-50);
    }

    .ctx-item svg {
      width: 14px;
      height: 14px;
      fill: currentColor;
    }

    .ctx-item.danger {
      color: var(--danger);
    }

    .ctx-item.danger:hover {
      background: #fff0f3;
    }

    .ctx-sep {
      height: 1px;
      background: var(--gray-100);
      margin: 4px 0;
    }

    /* ── CROP MODAL ── */
    #crop-modal {
      position: fixed;
      inset: 0;
      z-index: 600;
      background: rgba(0, 0, 0, .7);
      display: none;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 16px;
    }

    #crop-modal.open {
      display: flex;
    }

    #crop-container {
      position: relative;
      box-shadow: 0 24px 80px rgba(0, 0, 0, .5);
      cursor: crosshair;
      user-select: none;
    }

    #crop-img {
      display: block;
      max-width: min(90vw, 900px);
      max-height: min(75vh, 700px);
      object-fit: contain;
    }

    #crop-selection {
      position: absolute;
      border: 2px solid #fff;
      box-shadow: 0 0 0 9999px rgba(0, 0, 0, .45);
      pointer-events: none;
    }

    #crop-toolbar {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .crop-btn {
      height: 38px;
      padding: 0 20px;
      border-radius: var(--r-sm);
      border: none;
      font-family: var(--font);
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: all .15s;
    }

    .crop-btn.confirm {
      background: white;
      color: var(--gray-800);
    }

    .crop-btn.cancel {
      background: transparent;
      color: rgba(255, 255, 255, .7);
      border: 1px solid rgba(255, 255, 255, .25);
    }

    .crop-btn.cancel:hover {
      color: white;
    }

    .crop-hint {
      font-size: 12px;
      color: rgba(255, 255, 255, .5);
    }

    /* ── DROP OVERLAY ── */
    #drop-overlay {
      position: fixed;
      inset: 52px 0 0 0;
      background: rgba(15, 98, 254, .05);
      border: 2px dashed var(--accent);
      z-index: 50;
      display: none;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 12px;
      pointer-events: none;
    }

    #drop-overlay.active {
      display: flex;
    }

    #drop-overlay p {
      font-size: 18px;
      font-weight: 500;
      color: var(--accent);
    }

    #drop-overlay svg {
      width: 40px;
      height: 40px;
      fill: var(--accent);
    }

    /* ── TOAST ── */
    #toast {
      position: fixed;
      bottom: 80px;
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: var(--gray-800);
      color: white;
      font-size: 12px;
      font-weight: 500;
      padding: 8px 16px;
      border-radius: 20px;
      z-index: 300;
      opacity: 0;
      transition: all .25s;
      pointer-events: none;
    }

    #toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    .text-mode { cursor: text !important; }
    .pan-mode { cursor: grab !important; }
    .pan-mode:active { cursor: grabbing !important; }
  </style>
</head>
<body>

<div id="crop-modal">
  <div id="crop-container">
    <img id="crop-img" src="" alt="crop">
    <div id="crop-selection" style="display:none;"></div>
  </div>
  <div id="crop-toolbar">
    <button class="crop-btn confirm" onclick="applyCrop()">✓ Aplicar recorte</button>
    <button class="crop-btn cancel" onclick="closeCropModal()">Cancelar</button>
    <span class="crop-hint">Arrastra para seleccionar el área</span>
  </div>
</div>

<div id="link-modal">
  <div class="link-box">
    <h3>Añadir hipervínculo</h3>
    <input class="link-input" id="link-url" type="url" placeholder="https://ejemplo.com">
    <input class="link-input" id="link-label" type="text" placeholder="Texto del enlace (opcional)">
    <div class="link-actions">
      <button class="link-btn" onclick="closeLinkModal()">Cancelar</button>
      <button class="link-btn primary" onclick="applyLink()">Añadir</button>
    </div>
  </div>
</div>

<div id="drop-overlay">
  <svg viewBox="0 0 24 24"><path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/></svg>
  <p>Soltar imágenes aquí</p>
</div>

<header id="header">
  <div class="header-left">
    <div class="logo-mark">
      <svg viewBox="0 0 24 24"><path d="M21 3H3C1.9 3 1 3.9 1 5v14c0 1.1.9 2 2 2h18c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm0 16H3V5h18v14zm-10-7h8v5h-8z"/></svg>
    </div>
    <span class="board-title" contenteditable="true" id="board-title">Pizarra sin título</span>
  </div>
  <div class="header-right">
    <button class="hbtn" onclick="exportPNG()">

<script>
// ══════════════════════════════════════════
// SETUP CANVAS
// ══════════════════════════════════════════
const canvas = new fabric.Canvas('canvas', {
  width: window.innerWidth, 
  height: window.innerHeight,
  selection: true, 
  preserveObjectStacking: true,
  fireRightClick: true, 
  stopContextMenu: true,
});

const OBJ_DEF = { 
  cornerColor: '#0F62FE', 
  cornerStyle: 'circle', 
  transparentCorners: false, 
  cornerSize: 10, 
  borderColor: '#0F62FE', 
  borderScaleFactor: 1.5 
};

const applyDef = (obj) => {
  obj.set(OBJ_DEF);
  // Si el objeto fue cargado como bloqueado, restauramos su color visual
  if (obj.lockMovementX) {
    obj.set({
      hasControls: false,
      borderColor: '#aaaaaa'
    });
  }
};

let currentTool = 'select';
let isPanning = false;
let lastPanPoint = null;
let spaceDown = false;
let altDown = false;
let rightClickMoved = false;
let rightClickDownPos = null;

// ── HERRAMIENTAS ──
function setTool(tool) {
  currentTool = tool;
  document.querySelectorAll('.tool-btn').forEach(b => b.classList.remove('active'));
  
  const btn = document.getElementById('tool-' + tool);
  if (btn) btn.classList.add('active');
  
  const container = document.getElementById('canvas-container');
  container.classList.remove('text-mode', 'pan-mode');
  
  canvas.isDrawingMode = false; 
  canvas.selection = true;
  hideShapesPopover();
  
  if (tool === 'pan') { 
    canvas.selection = false; 
    container.classList.add('pan-mode'); 
  } else if (tool === 'text') { 
    container.classList.add('text-mode'); 
    canvas.selection = false; 
  } else if (tool === 'draw') { 
    canvas.isDrawingMode = true; 
    canvas.freeDrawingBrush.width = 3; 
    canvas.freeDrawingBrush.color = '#222222'; 
  }
}

// ── TECLADO Y MOUSE ──
document.getElementById('canvas-container').addEventListener('contextmenu', e => e.preventDefault());

window.addEventListener('keydown', ev => { 
  if (ev.key === 'Alt') ev.preventDefault(); 
});

document.addEventListener('keydown', ev => {
  if (ev.key === 'Alt' && !ev.target.isContentEditable) { 
    altDown = true; 
    if (currentTool === 'select') document.getElementById('canvas-container').classList.add('pan-mode'); 
  }
  if (ev.code === 'Space' && !ev.target.isContentEditable) { 
    spaceDown = true; 
    if (currentTool === 'select') document.getElementById('canvas-container').classList.add('pan-mode'); 
  }
  if ((ev.key === 'Delete' || ev.key === 'Backspace') && !ev.target.isContentEditable) { 
    const activeObj = canvas.getActiveObject(); 
    if (activeObj && !activeObj.isEditing && !activeObj.lockMovementX) deleteSelected(); 
  }
});

document.addEventListener('keyup', ev => {
  if (ev.key === 'Alt') { 
    altDown = false; 
    if (currentTool === 'select' && !spaceDown) document.getElementById('canvas-container').classList.remove('pan-mode'); 
  }
  if (ev.code === 'Space') { 
    spaceDown = false; 
    if (currentTool === 'select' && !altDown) document.getElementById('canvas-container').classList.remove('pan-mode'); 
  }
});

function shouldPan(e) { 
  return e.button === 1 || currentTool === 'pan' || (e.button === 0 && (spaceDown || altDown)); 
}

canvas.on('mouse:down', function(opt) {
  const e = opt.e;
  hideAllPopups();
  
  if (shouldPan(e)) {
    isPanning = true; 
    lastPanPoint = { x: e.clientX, y: e.clientY };
    document.getElementById('canvas-container').classList.add('pan-mode');
    canvas.setCursor('grabbing'); 
    if (e.button === 1) e.preventDefault(); 
    return;
  }
  
  if (e.button === 2) {
    rightClickMoved = false; 
    rightClickDownPos = { x: e.clientX, y: e.clientY };
    isPanning = true; 
    lastPanPoint = { x: e.clientX, y: e.clientY };
    document.getElementById('canvas-container').classList.add('pan-mode'); 
    canvas.setCursor('grabbing'); 
    return;
  }
  
  if (currentTool === 'text') {
    const pointer = canvas.getPointer(e);
    const textObj = new fabric.Textbox('Escribe aquí...', { 
      left: pointer.x, 
      top: pointer.y, 
      width: 240, 
      fontSize: 18, 
      fontFamily: 'DM Sans', 
      fill: '#222222', 
      editable: true, 
      ...OBJ_DEF 
    });
    canvas.add(textObj); 
    canvas.setActiveObject(textObj); 
    textObj.enterEditing(); 
    textObj.selectAll(); 
    canvas.renderAll(); 
    setTool('select'); 
    saveState();
  }
});

canvas.on('mouse:move', function(opt) {
  if (!isPanning || !lastPanPoint) return;
  const e = opt.e;
  const dx = e.clientX - lastPanPoint.x;
  const dy = e.clientY - lastPanPoint.y;
  
  if (rightClickDownPos && e.buttons === 2) { 
    if (Math.hypot(e.clientX - rightClickDownPos.x, e.clientY - rightClickDownPos.y) > 4) {
      rightClickMoved = true; 
    }
  }
  
  canvas.relativePan(new fabric.Point(dx, dy)); 
  lastPanPoint = { x: e.clientX, y: e.clientY }; 
  updateZoomLabel();
});

canvas.on('mouse:up', function(opt) {
  const e = opt.e;
  const wasRightClick = e && e.button === 2;
  
  isPanning = false; 
  lastPanPoint = null;
  
  if (!altDown && !spaceDown && currentTool !== 'pan') { 
    document.getElementById('canvas-container').classList.remove('pan-mode'); 
    canvas.setCursor('default'); 
  }
  
  if (wasRightClick && !rightClickMoved) { 
    const target = canvas.findTarget(e); 
    if (target) { 
      canvas.setActiveObject(target); 
      canvas.renderAll(); 
      showContextMenu(e.clientX, e.clientY); 
    } 
  }
  
  rightClickDownPos = null; 
  rightClickMoved = false; 
  clearGuides(); 
  saveState();
});

canvas.on('mouse:down:before', opt => { 
  if (spaceDown) { 
    isPanning = true; 
    lastPanPoint = { x: opt.e.clientX, y: opt.e.clientY }; 
  } 
});

canvas.on('mouse:wheel', function(opt) {
  let zoom = canvas.getZoom() * (0.999 ** opt.e.deltaY); 
  zoom = Math.min(Math.max(zoom, 0.05), 20);
  canvas.zoomToPoint({ x: opt.e.offsetX, y: opt.e.offsetY }, zoom); 
  opt.e.preventDefault(); 
  opt.e.stopPropagation(); 
  updateZoomLabel();
});

// ── SMART GUIDES ──
const GRID = 20;
const SNAP_THRESH = 8;
const GUIDE_THRESH = 14;

const guideCanvas = document.createElement('canvas');
guideCanvas.style.cssText = 'position:fixed;inset:0;pointer-events:none;z-index:10;';
guideCanvas.width = window.innerWidth; 
guideCanvas.height = window.innerHeight;
document.body.appendChild(guideCanvas);

const guideCtx = guideCanvas.getContext('2d');
window.addEventListener('resize', () => { 
  guideCanvas.width = window.innerWidth; 
  guideCanvas.height = window.innerHeight; 
});

function clearGuides() { 
  guideCtx.clearRect(0, 0, guideCanvas.width, guideCanvas.height); 
}

function drawGuides(lines) {
  guideCtx.clearRect(0, 0, guideCanvas.width, guideCanvas.height); 
  if (!lines.length) return;
  
  const vp = canvas.viewportTransform;
  const zoom = canvas.getZoom();
  
  guideCtx.save(); 
  guideCtx.strokeStyle = '#0F62FE'; 
  guideCtx.lineWidth = 1; 
  guideCtx.setLineDash([4, 3]); 
  guideCtx.globalAlpha = 0.8;
  
  lines.forEach(({ type, value }) => {
    guideCtx.beginPath();
    if (type === 'v') {
      const sx = value * zoom + vp[4]; 
      guideCtx.moveTo(sx, 0); 
      guideCtx.lineTo(sx, guideCanvas.height);
    } else {
      const sy = value * zoom + vp[5]; 
      guideCtx.moveTo(0, sy); 
      guideCtx.lineTo(guideCanvas.width, sy);
    }
    guideCtx.stroke();
  });
  guideCtx.restore();
}

function snapToGrid(val) { 
  const snapped = Math.round(val / GRID) * GRID; 
  return Math.abs(val - snapped) <= SNAP_THRESH ? snapped : val; 
}

function computeGuides(movingBBox, others) {
  const { left: mL, top: mT, right: mR, bottom: mB } = movingBBox;
  const mCX = (mL + mR) / 2;
  const mCY = (mT + mB) / 2;
  
  const lines = []; 
  let dx = 0;
  let dy = 0;
  
  others.forEach(o => {
    const oL = o.left;
    const oT = o.top;
    const oR = oL + o.getScaledWidth();
    const oB = oT + o.getScaledHeight();
    const oCX = (oL + oR) / 2;
    const oCY = (oT + oB) / 2;
    
    [{ mv: mL, ov: oL }, { mv: mL, ov: oR }, { mv: mR, ov: oR }, { mv: mR, ov: oL }, { mv: mCX, ov: oCX }].forEach(({ mv, ov }) => { 
      if (Math.abs(mv - ov) < GUIDE_THRESH) { 
        dx = ov - mv; 
        lines.push({ type: 'v', value: ov }); 
      } 
    });
    
    [{ mv: mT, ov: oT }, { mv: mT, ov: oB }, { mv: mB, ov: oB }, { mv: mB, ov: oT }, { mv: mCY, ov: oCY }].forEach(({ mv, ov }) => { 
      if (Math.abs(mv - ov) < GUIDE_THRESH) { 
        dy = ov - mv; 
        lines.push({ type: 'h', value: ov }); 
      } 
    });
  });
  
  return { dx, dy, lines };
}

canvas.on('object:moving', function(opt) {
  const obj = opt.target;
  const others = canvas.getObjects().filter(o => o !== obj);
  
  if (obj.type === 'image' || obj.type === 'group') {
    obj.set({ left: snapToGrid(obj.left), top: snapToGrid(obj.top) });
  }
  
  const bbox = { 
    left: obj.left, 
    top: obj.top, 
    right: obj.left + obj.getScaledWidth(), 
    bottom: obj.top + obj.getScaledHeight() 
  };
  
  const { dx, dy, lines } = computeGuides(bbox, others);
  
  if (dx) obj.set('left', obj.left + dx); 
  if (dy) obj.set('top', obj.top + dy);
  
  drawGuides(lines); 
  obj.setCoords();
});

canvas.on('object:scaling', function(opt) {
  const obj = opt.target;
  const others = canvas.getObjects().filter(o => o !== obj);
  const bbox = { 
    left: obj.left, 
    top: obj.top, 
    right: obj.left + obj.getScaledWidth(), 
    bottom: obj.top + obj.getScaledHeight() 
  };
  drawGuides(computeGuides(bbox, others).lines);
});

canvas.on('object:modified', clearGuides);

// ── PANELES Y UI ──
canvas.on('selection:created', updatePanel);
canvas.on('selection:updated', updatePanel);
canvas.on('selection:cleared', () => { 
  document.getElementById('obj-panel').classList.remove('visible'); 
  document.getElementById('text-toolbar').classList.remove('visible'); 
});
canvas.on('object:modified', updatePanel);
canvas.on('text:editing:entered', () => document.getElementById('text-toolbar').classList.add('visible'));
canvas.on('text:editing:exited', () => { saveState(); });

function updatePanel() {
  const obj = canvas.getActiveObject(); 
  if (!obj) return;
  
  document.getElementById('obj-panel').classList.add('visible');
  document.getElementById('panel-w').textContent = Math.round(obj.getScaledWidth()) + 'px';
  document.getElementById('panel-h').textContent = Math.round(obj.getScaledHeight()) + 'px';
  document.getElementById('panel-a').textContent = Math.round(obj.angle) + '°';
  
  // Actualizar etiqueta del botón Agrupar
  document.getElementById('panel-group-label').textContent = obj.type === 'activeSelection' ? 'Agrupar' : (obj.type === 'group' && !obj._isSticky ? 'Desagrupar' : 'Agrupar');
  
  // Actualizar visibilidad de recortes y colores
  document.getElementById('panel-crop-btn').style.display = obj.type === 'image' ? '' : 'none';
  document.getElementById('panel-color-btn').style.display = obj._isShape ? '' : 'none';

  // NUEVO: Actualizar etiqueta de botón Bloquear
  const lockLabel = document.getElementById('panel-lock-label');
  if (lockLabel) {
    lockLabel.textContent = obj.lockMovementX ? 'Desbloquear' : 'Bloquear';
  }
  
  if (obj.type === 'textbox' || obj.type === 'i-text') { 
    document.getElementById('text-toolbar').classList.add('visible'); 
    syncTextToolbar(obj); 
  }
}

function syncTextToolbar(obj) {
  document.getElementById('fmt-bold').classList.toggle('active', obj.fontWeight === 'bold');
  document.getElementById('fmt-italic').classList.toggle('active', obj.fontStyle === 'italic');
  document.getElementById('fmt-underline').classList.toggle('active', !!obj.underline);
  if (obj.fontSize) document.getElementById('fmt-size').value = obj.fontSize;
  if (obj.fontFamily) document.getElementById('fmt-font').value = obj.fontFamily;
}

// ── BLOQUEAR / DESBLOQUEAR OBJETOS ──
function toggleLock() {
  const obj = canvas.getActiveObject();
  if (!obj) return;

  const isLocked = obj.lockMovementX; 
  const newState = !isLocked;

  // Cambiar propiedades de Fabric.js
  obj.set({
    lockMovementX: newState,
    lockMovementY: newState,
    lockRotation: newState,
    lockScalingX: newState,
    lockScalingY: newState,
    hasControls: !newState,
    borderColor: newState ? '#aaaaaa' : '#0F62FE'
  });

  canvas.renderAll();
  updatePanel();
  saveState();
  toast(newState ? 'Elemento bloqueado' : 'Elemento desbloqueado');
}

// ── FORMATO DE TEXTO ──
function applyFmt(type, value) {
  const obj = canvas.getActiveObject(); 
  if (!obj) return;
  if (obj.type !== 'textbox' && obj.type !== 'i-text') return;
  
  if (type === 'bold') { 
    const n = obj.fontWeight === 'bold' ? 'normal' : 'bold'; 
    if (obj.isEditing) obj.setSelectionStyles({ fontWeight: n }); 
    else obj.set('fontWeight', n); 
    document.getElementById('fmt-bold').classList.toggle('active', n === 'bold'); 
  } else if (type === 'italic') { 
    const n = obj.fontStyle === 'italic' ? 'normal' : 'italic'; 
    if (obj.isEditing) obj.setSelectionStyles({ fontStyle: n }); 
    else obj.set('fontStyle', n); 
    document.getElementById('fmt-italic').classList.toggle('active', n === 'italic'); 
  } else if (type === 'underline') { 
    const n = !obj.underline; 
    if (obj.isEditing) obj.setSelectionStyles({ underline: n }); 
    else obj.set('underline', n); 
    document.getElementById('fmt-underline').classList.toggle('active', n); 
  } else if (type === 'size') { 
    if (obj.isEditing) obj.setSelectionStyles({ fontSize: value }); 
    else obj.set('fontSize', value); 
  } else if (type === 'font') { 
    if (obj.isEditing) obj.setSelectionStyles({ fontFamily: value }); 
    else obj.set('fontFamily', value); 
  } else if (type === 'align') { 
    obj.set('textAlign', value); 
  } else if (type === 'color') { 
    if (obj.isEditing) obj.setSelectionStyles({ fill: value }); 
    else obj.set('fill', value); 
  }
  
  canvas.renderAll(); 
  saveState();
}

function pickTextColor() { 
  document.getElementById('text-color-input').click(); 
}

function openLinkModal() {

  document.getElementById('link-label').value = '';

function closeLinkModal() {

}

function applyLink() {

// ── FORMAS GEOMÉTRICAS ──
const PALETTE = ['#FFEB3B', '#FF9800', '#F44336', '#E91E63', '#9C27B0', '#3F51B5', '#2196F3', '#00BCD4', '#4CAF50', '#8BC34A', '#795548', '#9E9E9E', '#607D8B', '#ffffff', '#000000'];

(function buildSwatches() {
  ['fill', 'stroke'].forEach(kind => {
    const grid = document.getElementById(kind + '-swatches'); 
    grid.innerHTML = '';
    PALETTE.forEach(color => {
      const el = document.createElement('div'); 
      el.className = 'cp-swatch'; 
      el.style.background = color;
      if (color === '#ffffff') el.style.border = '1px solid #ddd';
      el.onclick = () => applyShapeColor(kind, color); 
      grid.appendChild(el);
    });
  });
})();

function toggleShapesPopover() {
  const popover = document.getElementById('shapes-popover');
  const btn = document.getElementById('tool-shape').getBoundingClientRect();
  popover.style.top = (btn.top - 4) + 'px'; 
  popover.classList.toggle('open');
}

function hideShapesPopover() { 
  document.getElementById('shapes-popover').classList.remove('open'); 
}

function addShape(type) {
  hideShapesPopover();
  const vp = canvas.viewportTransform;
  const zoom = canvas.getZoom();
  const cx = (window.innerWidth / 2 - vp[4]) / zoom;
  const cy = (window.innerHeight / 2 - vp[5]) / zoom;
  
  const baseDef = { 
    left: cx - 75, 
    top: cy - 60, 
    fill: '#2196F3', 
    stroke: null, 
    strokeWidth: 0, 
    _isShape: true, 
    ...OBJ_DEF 
  };
  
  let obj;
  if (type === 'rect') {
    obj = new fabric.Rect({ ...baseDef, width: 150, height: 120, rx: 4, ry: 4 });
  } else if (type === 'circle') {
    obj = new fabric.Ellipse({ ...baseDef, rx: 75, ry: 60 });
  } else if (type === 'triangle') {
    obj = new fabric.Triangle({ ...baseDef, width: 150, height: 130 });
  } else if (type === 'star') {
    const pts = []; 
    for (let i = 0; i < 10; i++) {
      const angle = (i * Math.PI) / 5 - Math.PI / 2;
      const radius = i % 2 === 0 ? 75 : 32; 
      pts.push({ x: Math.cos(angle) * radius, y: Math.sin(angle) * radius });
    }
    obj = new fabric.Polygon(pts, { ...baseDef, left: cx - 75, top: cy - 75 });
  } else if (type === 'diamond') {
    obj = new fabric.Polygon([
      { x: 0, y: -70 }, { x: 75, y: 0 }, { x: 0, y: 70 }, { x: -75, y: 0 }
    ], { ...baseDef });
  } else if (type === 'line') {
    obj = new fabric.Line([cx - 80, cy, cx + 80, cy], { 
      stroke: '#333333', 
      strokeWidth: 3, 
      _isShape: true, 
      ...OBJ_DEF 
    });
  } else if (type === 'arrow') {
    const svgPath = `M ${cx-80} ${cy} L ${cx+60} ${cy} M ${cx+40} ${cy-20} L ${cx+80} ${cy} L ${cx+40} ${cy+20}`;
    obj = new fabric.Path(svgPath, { 
      stroke: '#333333', 
      strokeWidth: 3, 
      fill: 'transparent', 
      _isShape: true, 
      ...OBJ_DEF 
    });
  }
  
  if (obj) {
    canvas.add(obj);
    canvas.setActiveObject(obj);
    canvas.renderAll();
    saveState();
  }
  setTool('select');
}

function openColorPanel(evt) {
  const panel = document.getElementById('color-panel');
  const rect = (evt && evt.currentTarget) ? evt.currentTarget.getBoundingClientRect() : document.getElementById('panel-color-btn').getBoundingClientRect();
  panel.style.right = (window.innerWidth - rect.left + 8) + 'px'; 
  panel.style.top = rect.top + 'px';
  panel.classList.toggle('open');
}

function applyShapeColor(kind, color) {
  const obj = canvas.getActiveObject(); 
  if (!obj) return;
  
  if (kind === 'fill') {
    obj.set('fill', color || 'transparent');
  } else {
    obj.set('stroke', color || null);
    obj.set('strokeWidth', color ? 2 : 0);
  }
  
  canvas.renderAll(); 
  saveState();
}

// ── IMÁGENES ──
document.getElementById('file-input').onchange = function(e) {
  loadImages(Array.from(e.target.files));
  this.value = '';
};

function loadImages(files) {
  const cols = 4;
  const spacing = 340;
  const startX = 200;
  const startY = 150;
  let loaded = 0;
  const existingCount = canvas.getObjects().filter(o => o.type === 'image').length;
  
  files.forEach(file => {
    if (!file.type.startsWith('image/')) return;
    const reader = new FileReader();
    reader.onload = f => { 
      fabric.Image.fromURL(f.target.result, img => { 
        const idx = existingCount + loaded; 
        img.scaleToWidth(300); 
        img.set({
          left: startX + (idx % cols) * spacing,
          top: startY + Math.floor(idx / cols) * spacing,
          ...OBJ_DEF
        }); 
        canvas.add(img); 
        loaded++; 
        if (loaded === files.length) {
          canvas.renderAll();
          toast(`${loaded} foto${loaded > 1 ? 's' : ''} cargada${loaded > 1 ? 's' : ''}`);
          saveState();
        }
      });
    };
    reader.readAsDataURL(file);
  });
}

const dropOverlay = document.getElementById('drop-overlay');
document.addEventListener('dragover', e => { 
  e.preventDefault(); 
  dropOverlay.classList.add('active'); 
});
document.addEventListener('dragleave', e => { 
  if (!e.relatedTarget) dropOverlay.classList.remove('active'); 
});
document.addEventListener('drop', e => {
  e.preventDefault();
  dropOverlay.classList.remove('active');
  const files = Array.from(e.dataTransfer.files).filter(f => f.type.startsWith('image/'));
  loadImages(files);
});

// ── STICKY NOTES ──
const STICKY_COLORS = ['#FFF176', '#B9F6CA', '#B3E5FC', '#F8BBD0', '#E1BEE7'];

function addStickyNote() {
  const vp = canvas.viewportTransform;
  const zoom = canvas.getZoom();
  const cx = (window.innerWidth / 2 - vp[4]) / zoom;
  const cy = (window.innerHeight / 2 - vp[5]) / zoom;
  const randomColor = STICKY_COLORS[Math.floor(Math.random() * STICKY_COLORS.length)];
  
  _createSticky({ 
    left: cx - 100, 
    top: cy - 90, 
    color: randomColor, 
    text: '' 
  });
  
  setTool('select'); 
  saveState();
}

function _createSticky({ left, top, color, text, scaleX = 1, scaleY = 1, angle = 0 }) {
  const W = 200, H = 180, PAD = 12;
  
  const background = new fabric.Rect({
    width: W, height: H, 
    left: -W/2, top: -H/2, 
    fill: color, 
    rx: 4, ry: 4, 
    shadow: new fabric.Shadow({ color: 'rgba(0,0,0,0.13)', blur: 10, offsetX: 2, offsetY: 4 }),
    selectable: false, evented: false, 
    originX: 'left', originY: 'top'
  });
  
  const label = new fabric.Textbox(text || 'Escribe aquí...', {
    width: W - PAD * 2, 
    left: -W/2 + PAD, 
    top: -H/2 + PAD, 
    fontSize: 14, 
    fontFamily: 'DM Sans', 
    fill: '#333333', 
    editable: false, 
    splitByGrapheme: false, 
    selectable: false, evented: false, 
    originX: 'left', originY: 'top'
  });
  
  const group = new fabric.Group([background, label], {
    left, top, 
    scaleX, scaleY, angle, 
    _isSticky: true, 
    _stickyColor: color, 
    ...OBJ_DEF
  });
  
  group.on('mousedblclick', () => _editStickyInPlace(group));
  canvas.add(group); 
  canvas.setActiveObject(group); 
  canvas.renderAll(); 
  return group;
}

function _editStickyInPlace(group) {
  const zoom = canvas.getZoom();
  const vp = canvas.viewportTransform;
  const gLeft = group.left * zoom + vp[4];
  const gTop = group.top * zoom + vp[5];
  const width = group.width * group.scaleX * zoom;
  const height = group.height * group.scaleY * zoom;
  const padding = 12 * zoom;
  
  const overlay = document.createElement('div');
  overlay.style.cssText = `position:fixed; left:${gLeft}px; top:${gTop}px; width:${width}px; height:${height}px; background:${group._stickyColor}; border-radius:4px; box-shadow:0 4px 16px rgba(0,0,0,.18); z-index:400; padding:${padding}px; box-sizing:border-box;`;
  
  const textarea = document.createElement('textarea');
  const children = group.getObjects();
  const textObj = children.find(o => o.type === 'textbox' || o.type === 'i-text');
  
  textarea.value = textObj ? textObj.text : '';
  textarea.style.cssText = `width:100%; height:100%; border:none; outline:none; resize:none; background:transparent; font-family:'DM Sans',sans-serif; font-size:${14*zoom}px; color:#333; line-height:1.5;`;
  
  overlay.appendChild(textarea); 
  document.body.appendChild(overlay); 
  textarea.focus(); 
  textarea.select();
  
  let isDone = false;
  
  function commit() { 
    if (isDone) return; 
    isDone = true; 
    const { left, top, scaleX, scaleY, angle, _stickyColor } = group; 
    canvas.remove(group); 
    if (overlay.parentNode) document.body.removeChild(overlay); 
    
    _createSticky({ 
      left: left, 
      top: top, 
      color: _stickyColor, 
      text: textarea.value || 'Escribe aquí...', 
      scaleX, scaleY, angle 
    }); 
    
    canvas.renderAll(); 
    saveState(); 
  }
  
  textarea.addEventListener('keydown', e => { 
    if (e.key === 'Escape') commit(); 
  });
  
  setTimeout(() => { 
    document.addEventListener('mousedown', function onClickOutside(e) { 
      if (!overlay.contains(e.target)) {
        commit();
        document.removeEventListener('mousedown', onClickOutside);
      } 
    }); 
  }, 100);
}

// ── EDICIÓN RÁPIDA ──
function rotateObj() { 
  const obj = canvas.getActiveObject(); 
  if (!obj) return; 
  obj.rotate((obj.angle + 90) % 360); 
  canvas.renderAll(); 
  updatePanel(); 
  saveState(); 
}

function flipObjX() { 
  const obj = canvas.getActiveObject(); 
  if (!obj) return; 
  obj.set('flipX', !obj.flipX); 
  canvas.renderAll(); 
  saveState(); 
}

function bringToFront() { 
  const obj = canvas.getActiveObject(); 
  if (!obj) return; 
  canvas.bringToFront(obj); 
  canvas.renderAll(); 
  saveState(); 
}

function deleteSelected() { 
  const objects = canvas.getActiveObjects();
  // Ignoramos la eliminación si el objeto está bloqueado
  objects.forEach(o => {
    if (!o.lockMovementX) canvas.remove(o);
  });
  canvas.discardActiveObject(); 
  canvas.renderAll(); 
  document.getElementById('obj-panel').classList.remove('visible'); 
  saveState(); 
}

function toggleGroup() {
  const activeObj = canvas.getActiveObject(); 
  if (!activeObj) return;
  
  if (activeObj.type === 'activeSelection') { 
    const group = activeObj.toGroup(); 
    applyDef(group); 
    canvas.setActiveObject(group); 
    canvas.renderAll(); 
    toast('Elementos agrupados'); 
    saveState(); 
  } else if (activeObj.type === 'group' && !activeObj._isSticky) { 
    activeObj.toActiveSelection(); 
    canvas.getActiveObjects().forEach(applyDef); 
    canvas.renderAll(); 
    toast('Grupo desagrupado'); 
    saveState(); 
  } else {
    toast('Selecciona varios elementos para agrupar');
  }
}

// ── CONTEXT MENU ──
const ctxMenu = document.getElementById('ctx-menu');

function showContextMenu(x, y) {
  const obj = canvas.getActiveObject();
  document.getElementById('ctx-crop').style.display = obj && obj.type === 'image' ? '' : 'none';
  document.getElementById('ctx-color').style.display = obj && obj._isShape ? '' : 'none';
  
  // Actualizar etiqueta del botón de bloqueo en el menú contextual
  const ctxLock = document.getElementById('ctx-lock-label');
  if (ctxLock && obj) {
    ctxLock.textContent = obj.lockMovementX ? 'Desbloquear' : 'Bloquear';
  }

  ctxMenu.style.left = x + 'px'; 
  ctxMenu.style.top = y + 'px'; 
  ctxMenu.classList.add('open');
}

function hideContextMenu() { 
  ctxMenu.classList.remove('open'); 
}

document.addEventListener('click', hideContextMenu);

function ctxAction(action) {
  const obj = canvas.getActiveObject(); 
  if (!obj) return;
  
  if (action === 'front') canvas.bringToFront(obj);
  else if (action === 'back') canvas.sendToBack(obj);
  else if (action === 'flip') obj.set('flipX', !obj.flipX);
  else if (action === 'rotate') obj.rotate((obj.angle + 90) % 360);
  else if (action === 'crop') { hideContextMenu(); startCrop(); return; }
  else if (action === 'group') { hideContextMenu(); toggleGroup(); return; }
  else if (action === 'color') { hideContextMenu(); openColorPanel(null); return; }
  else if (action === 'lock') { hideContextMenu(); toggleLock(); return; }
  else if (action === 'delete') { deleteSelected(); hideContextMenu(); return; }
  
  canvas.renderAll(); 
  saveState(); 
  hideContextMenu();
}

// ── ORGANIZAR ──
function arrangeGrid() {
  const images = canvas.getObjects().filter(o => o.type === 'image'); 
  if (!images.length) { 
    toast('No hay fotos para organizar'); 
    return; 
  }
  
  const cols = Math.ceil(Math.sqrt(images.length));
  images.forEach((img, i) => {
    img.set({
      left: 100 + (i % cols) * 340,
      top: 100 + Math.floor(i / cols) * 340
    });
  });
  
  canvas.renderAll(); 
  saveState(); 
  toast('Imágenes organizadas'); 
  fitAll();
}

function fitAll() {
  const objects = canvas.getObjects(); 
  if (!objects.length) return;
  
  const bounds = objects.reduce((b, o) => {
    const r = o.getBoundingRect(true);
    return {
      left: Math.min(b.left, r.left),
      top: Math.min(b.top, r.top),
      right: Math.max(b.right, r.left + r.width),
      bottom: Math.max(b.bottom, r.top + r.height)
    };
  }, { left: Infinity, top: Infinity, right: -Infinity, bottom: -Infinity });
  
  const padding = 80;
  const W = window.innerWidth - padding * 2;
  const H = window.innerHeight - 52 - padding * 2;
  const zoom = Math.min(W / (bounds.right - bounds.left), H / (bounds.bottom - bounds.top), 1);
  
  canvas.setZoom(zoom); 
  canvas.setViewportTransform([zoom, 0, 0, zoom, padding - bounds.left * zoom, 52 + padding - bounds.top * zoom]); 
  updateZoomLabel();
}

// ── EXPORTAR, ZOOM Y LIMPIAR ──
function exportPNG() {
  if (!canvas.getObjects().length) { 
    toast('No hay contenido para exportar'); 
    return; 
  }
  const anchor = document.createElement('a');
  const title = (document.getElementById('board-title').textContent.trim() || 'pizarra').replace(/\s+/g, '-').toLowerCase();
  anchor.download = title + '.png';
  anchor.href = canvas.toDataURL({ format: 'png', multiplier: 2 }); 
  anchor.click(); 
  toast('Exportando imagen…');
}

function updateZoomLabel() { 
  document.getElementById('zoom-label').textContent = Math.round(canvas.getZoom() * 100) + '%'; 
}

function zoomStep(delta) { 
  const zoom = Math.min(Math.max(canvas.getZoom() + delta, 0.1), 10); 
  canvas.zoomToPoint({ x: window.innerWidth / 2, y: window.innerHeight / 2 }, zoom); 
  updateZoomLabel(); 
}

function clearCanvas() { 
  if (!confirm('¿Limpiar toda la pizarra? Esta acción no se puede deshacer.')) return; 
  canvas.clear(); 
  canvas.setZoom(1); 
  canvas.setViewportTransform([1, 0, 0, 1, 0, 0]); 
  clearIDB().catch(() => {}); 
  updateZoomLabel(); 
  toast('Pizarra limpiada'); 
}

function hideAllPopups() { 
  hideContextMenu(); 
  hideShapesPopover(); 
  document.getElementById('color-panel').classList.remove('open'); 
}

// ── RECORTE DE IMÁGENES ──
let cropTargetObj = null;
let cropOriginalSrc = null;
let cropSel = { x: 0, y: 0, w: 0, h: 0 };
let cropDragging = false;
let cropStart = { x: 0, y: 0 };

function startCrop() { 
  const obj = canvas.getActiveObject(); 
  if (!obj || obj.type !== 'image') { 
    toast('Selecciona una imagen para recortar'); 
    return; 
  } 
  
  cropTargetObj = obj; 
  const el = obj.getElement();
  const offscreenCanvas = document.createElement('canvas'); 
  offscreenCanvas.width = el.naturalWidth || el.width; 
  offscreenCanvas.height = el.naturalHeight || el.height; 
  offscreenCanvas.getContext('2d').drawImage(el, 0, 0); 
  
  cropOriginalSrc = offscreenCanvas.toDataURL(); 
  const cropImgElem = document.getElementById('crop-img'); 
  cropImgElem.src = cropOriginalSrc; 
  cropImgElem.onload = () => {
    resetCropSel();
    document.getElementById('crop-modal').classList.add('open');
  }; 
}

function resetCropSel() { 
  document.getElementById('crop-selection').style.display = 'none'; 
  cropSel = { x: 0, y: 0, w: 0, h: 0 }; 
}

function closeCropModal() { 
  document.getElementById('crop-modal').classList.remove('open'); 
  resetCropSel(); 
  cropTargetObj = null; 
  cropOriginalSrc = null; 
}

const cropContainer = document.getElementById('crop-container');

cropContainer.addEventListener('mousedown', e => { 
  const rect = document.getElementById('crop-img').getBoundingClientRect(); 
  cropStart = { x: e.clientX - rect.left, y: e.clientY - rect.top }; 
  cropDragging = true; 
  const selectionDiv = document.getElementById('crop-selection'); 
  selectionDiv.style.cssText = `display:block; left:${cropStart.x}px; top:${cropStart.y}px; width:0; height:0;`; 
  e.preventDefault(); 
});

document.addEventListener('mousemove', e => { 
  if (!cropDragging) return; 
  const rect = document.getElementById('crop-img').getBoundingClientRect(); 
  const curX = Math.min(Math.max(e.clientX - rect.left, 0), rect.width);
  const curY = Math.min(Math.max(e.clientY - rect.top, 0), rect.height); 
  const x = Math.min(curX, cropStart.x);
  const y = Math.min(curY, cropStart.y);
  const w = Math.abs(curX - cropStart.x);
  const h = Math.abs(curY - cropStart.y); 
  
  cropSel = { x, y, w, h }; 
  
  const selectionDiv = document.getElementById('crop-selection'); 
  selectionDiv.style.left = x + 'px';
  selectionDiv.style.top = y + 'px';
  selectionDiv.style.width = w + 'px';
  selectionDiv.style.height = h + 'px'; 
});

document.addEventListener('mouseup', () => { 
  cropDragging = false; 
});

function applyCrop() {
  if (cropSel.w < 5 || cropSel.h < 5) {
    toast('Dibuja un área de recorte primero');
    return;
  }
  
  const cropImgElem = document.getElementById('crop-img');
  const dW = cropImgElem.getBoundingClientRect().width;
  const dH = cropImgElem.getBoundingClientRect().height;
  const scaleX = cropImgElem.naturalWidth / dW;
  const scaleY = cropImgElem.naturalHeight / dH;
  
  const offscreenCanvas = document.createElement('canvas'); 
  offscreenCanvas.width = Math.round(cropSel.w * scaleX); 
  offscreenCanvas.height = Math.round(cropSel.h * scaleY);
  
  const tempImg = new Image(); 
  tempImg.onload = () => { 
    offscreenCanvas.getContext('2d').drawImage(
      tempImg,
      Math.round(cropSel.x * scaleX), Math.round(cropSel.y * scaleY), 
      offscreenCanvas.width, offscreenCanvas.height,
      0, 0, 
      offscreenCanvas.width, offscreenCanvas.height
    ); 
    
    fabric.Image.fromURL(offscreenCanvas.toDataURL('image/png'), newImg => { 
      const oldObj = cropTargetObj; 
      newImg.set({
        left: oldObj.left, 
        top: oldObj.top, 
        angle: oldObj.angle, 
        scaleX: oldObj.scaleX, 
        scaleY: oldObj.scaleY, 
        ...OBJ_DEF
      }); 
      canvas.remove(oldObj); 
      canvas.add(newImg); 
      canvas.setActiveObject(newImg); 
      canvas.renderAll(); 
      saveState(); 
      closeCropModal(); 
      toast('Recorte aplicado'); 
    }); 
  }; 
  tempImg.src = cropOriginalSrc;
}

document.addEventListener('keydown', e => { 
  if (e.key === 'Escape') { 
    closeCropModal(); 
    closeLinkModal(); 
  } 
});

// ── INDEXEDDB (PERSISTENCIA) ──
const IDB_NAME = 'frameboard';
const IDB_STORE = 'state'; 
let db = null;

function openDB() { 
  return new Promise((resolve, reject) => { 
    if (db) return resolve(db); 
    const request = indexedDB.open(IDB_NAME, 1); 
    request.onupgradeneeded = e => e.target.result.createObjectStore(IDB_STORE); 
    request.onsuccess = e => { db = e.target.result; resolve(db); }; 
    request.onerror = e => reject(e.target.error); 
  }); 
}

function idbSet(key, value) { 
  return openDB().then(database => new Promise((resolve, reject) => {
    const query = database.transaction(IDB_STORE, 'readwrite').objectStore(IDB_STORE).put(value, key);
    query.onsuccess = resolve;
    query.onerror = e => reject(e.target.error);
  })); 
}

function idbGet(key) { 
  return openDB().then(database => new Promise((resolve, reject) => {
    const query = database.transaction(IDB_STORE, 'readonly').objectStore(IDB_STORE).get(key);
    query.onsuccess = e => resolve(e.target.result);
    query.onerror = e => reject(e.target.error);
  })); 
}

function idbDelete(key) { 
  return openDB().then(database => new Promise((resolve, reject) => {
    const query = database.transaction(IDB_STORE, 'readwrite').objectStore(IDB_STORE).delete(key);
    query.onsuccess = resolve;
    query.onerror = e => reject(e.target.error);
  })); 
}

function clearIDB() { 
  return Promise.all([idbDelete('canvas'), idbDelete('title')]); 
}

const CUSTOM_PROPS = [
  'cornerColor', 'cornerStyle', 'cornerSize', 'borderColor',
  '_isSticky', '_stickyColor', '_isShape', '_isLink', '_linkUrl',
  'lockMovementX', 'lockMovementY', 'lockRotation', 'lockScalingX', 'lockScalingY', 'hasControls'
];

let saveTimer = null;

function saveState() { 
  clearTimeout(saveTimer); 
  saveTimer = setTimeout(() => { 
    try { 
      idbSet('canvas', canvas.toJSON(CUSTOM_PROPS)).catch(() => {}); 
      idbSet('title', document.getElementById('board-title').textContent).catch(() => {}); 
    } catch(e) { console.warn(e); } 
  }, 600); 
}

function loadState() {
  Promise.all([idbGet('canvas'), idbGet('title')]).then(([savedCanvas, savedTitle]) => {
    if (savedTitle) document.getElementById('board-title').textContent = savedTitle;
    if (!savedCanvas) return;
    
    canvas.loadFromJSON(savedCanvas, () => {
      canvas.getObjects().forEach(obj => {
        applyDef(obj);
        if (obj._isSticky) obj.on('mousedblclick', () => _editStickyInPlace(obj));
        if (obj._isLink && obj._linkUrl) obj.on('mousedblclick', () => window.open(obj._linkUrl, '_blank'));
      });
      canvas.renderAll();
    });
  }).catch(e => console.warn(e));
}

document.getElementById('board-title').addEventListener('blur', saveState);

// ── TOAST Y RESPONSIVE ──
let toastTimer;
function toast(msg) { 
  const el = document.getElementById('toast'); 
  el.textContent = msg; 
  el.classList.add('show'); 
  clearTimeout(toastTimer); 
  toastTimer = setTimeout(() => el.classList.remove('show'), 2200); 
}

window.addEventListener('resize', () => { 
  canvas.setWidth(window.innerWidth); 
  canvas.setHeight(window.innerHeight); 
  canvas.renderAll(); 
});

if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('./sw.js').catch(() => {});
}

// ── INICIALIZACIÓN ──
loadState(); 
updateZoomLabel();
</script>
