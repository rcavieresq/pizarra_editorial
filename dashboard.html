<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pizarra Editorial - Dashboard</title>
  <link rel="manifest" href="manifest.json">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #f3f2f1;
      --white: #ffffff;
      --primary: #0F62FE;
      --text-main: #242424;
      --text-muted: #605e5c;
      --border: #edebe9;
      --shadow: 0 2px 4px rgba(0,0,0,0.08);
      --shadow-hover: 0 4px 12px rgba(0,0,0,0.15);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    
    body {
      font-family: 'DM Sans', sans-serif;
      background-color: var(--bg);
      color: var(--text-main);
    }

    /* HEADER */
    header {
      background: #222;
      color: white;
      padding: 16px 24px;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    
    .logo-icon {
      width: 24px; height: 24px;
      background: var(--primary);
      border-radius: 4px;
      display: flex; align-items: center; justify-content: center;
    }
    .logo-icon svg { width: 14px; fill: white; }
    header h1 { font-size: 16px; font-weight: 500; }

    /* CONTENEDOR PRINCIPAL */
    main { padding: 32px 48px; max-width: 1400px; margin: 0 auto; }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 24px;
    }

    /* TARJETAS */
    .card {
      background: var(--white);
      border-radius: 8px;
      overflow: hidden;
      box-shadow: var(--shadow);
      transition: box-shadow 0.2s, transform 0.2s;
      cursor: pointer;
      display: flex;
      flex-direction: column;
      height: 200px;
      position: relative;
      text-decoration: none;
      color: inherit;
    }
    
    .card:hover {
      box-shadow: var(--shadow-hover);
      transform: translateY(-2px);
    }

    /* TARJETA: CREAR NUEVA */
    .card.new-board {
      background: var(--primary);
      color: white;
      align-items: center;
      justify-content: center;
    }
    .card.new-board .plus-icon {
      width: 48px; height: 48px;
      background: white;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      margin-bottom: 12px;
      color: var(--primary);
      font-size: 24px;
    }
    .card.new-board span { font-weight: 500; }

    /* TARJETA: PIZARRA EXISTENTE */
    .board-thumb {
      flex: 1;
      background: #fafafa;
      background-size: cover;
      background-position: center;
      border-bottom: 1px solid var(--border);
    }
    
    .board-info {
      padding: 12px 16px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    
    .board-details h3 {
      font-size: 14px; font-weight: 500; margin-bottom: 4px;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 150px;
    }
    .board-details p { font-size: 11px; color: var(--text-muted); }

    .card-actions { display: flex; gap: 4px; }
    .menu-btn {
      background: none; border: none; color: var(--text-muted);
      cursor: pointer; padding: 6px; border-radius: 4px;
      display: flex; align-items: center; justify-content: center;
    }
    .menu-btn:hover { background: var(--border); color: var(--text-main); }
  </style>
</head>
<body>
  <header>
    <div class="logo-icon"><svg viewBox="0 0 24 24"><path d="M21 3H3C1.9 3 1 3.9 1 5v14c0 1.1.9 2 2 2h18c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm0 16H3V5h18v14zm-10-7h8v5h-8z"/></svg></div>
    <h1>Pizarra Editorial</h1>
  </header>

  <main>
    <div class="grid" id="boards-grid">
      <a href="index.html?id=new" class="card new-board">
        <div class="plus-icon"><svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor"><path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/></svg></div>
        <span>Nueva Pizarra</span>
      </a>
    </div>
  </main>

  <script>
    const IDB_NAME = 'FrameBoardApp';
    const IDB_VERSION = 2;
    const STORE_NAME = 'boards';

    function openDB() {
      return new Promise((resolve, reject) => {
        const req = indexedDB.open(IDB_NAME, IDB_VERSION);
        req.onupgradeneeded = e => {
          const db = e.target.result;
          if (!db.objectStoreNames.contains(STORE_NAME)) {
            db.createObjectStore(STORE_NAME, { keyPath: 'id' });
          }
        };
        req.onsuccess = e => resolve(e.target.result);
        req.onerror = e => reject(e.target.error);
      });
    }

    function getAllBoards() {
      return openDB().then(db => new Promise((resolve, reject) => {
        const tx = db.transaction(STORE_NAME, 'readonly');
        const req = tx.objectStore(STORE_NAME).getAll();
        req.onsuccess = e => resolve(e.target.result);
        req.onerror = e => reject(e.target.error);
      }));
    }

    function deleteBoard(id, event) {
      event.preventDefault();
      event.stopPropagation();
      if (!confirm('¿Seguro que deseas eliminar esta pizarra?')) return;
      openDB().then(db => new Promise((resolve, reject) => {
        const tx = db.transaction(STORE_NAME, 'readwrite');
        const req = tx.objectStore(STORE_NAME).delete(id);
        req.onsuccess = () => { loadBoards(); resolve(); };
        req.onerror = e => reject(e.target.error);
      }));
    }

    function renameBoard(id, currentTitle, event) {
      event.preventDefault();
      event.stopPropagation();
      const newTitle = prompt('Nuevo nombre para la pizarra:', currentTitle);
      if (newTitle === null) return;
      const trimmedTitle = newTitle.trim() || 'Pizarra sin título';
      openDB().then(db => {
        const tx = db.transaction(STORE_NAME, 'readwrite');
        const store = tx.objectStore(STORE_NAME);
        const getReq = store.get(id);
        getReq.onsuccess = e => {
          const board = e.target.result;
          if (board) {
            board.title = trimmedTitle;
            board.updatedAt = Date.now();
            store.put(board).onsuccess = () => { loadBoards(); };
          }
        };
      });
    }

    function loadBoards() {
      const grid = document.getElementById('boards-grid');
      grid.innerHTML = `
        <a href="index.html?id=new" class="card new-board">
          <div class="plus-icon"><svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor"><path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/></svg></div>
          <span>Nueva Pizarra</span>
        </a>
      `;

      getAllBoards().then(boards => {
        boards.sort((a, b) => b.updatedAt - a.updatedAt);
        boards.forEach(board => {
          const date = new Date(board.updatedAt).toLocaleDateString('es-CL', { day: '2-digit', month: '2-digit', year: 'numeric', hour: '2-digit', minute:'2-digit' });
          const card = document.createElement('a');
          card.href = `index.html?id=${board.id}`;
          card.className = 'card';
          const bgImage = board.thumbnail ? `url(${board.thumbnail})` : 'none';

          card.innerHTML = `
            <div class="board-thumb" style="background-image: ${bgImage}; background-color: #e0e0e0;"></div>
            <div class="board-info">
              <div class="board-details">
                <h3>${board.title || 'Pizarra sin título'}</h3>
                <p>Editado: ${date}</p>
              </div>
              <div class="card-actions">
                <button class="menu-btn" onclick="renameBoard('${board.id}', '${board.title ? board.title.replace(/'/g, "\\'") : ''}', event)" title="Renombrar">
                  <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M3 17.25V21h3.75L17.81 9.94l-3.75-3.75L3 17.25zM20.71 7.04c.39-.39.39-1.02 0-1.41l-2.34-2.34c-.39-.39-1.02-.39-1.41 0l-1.83 1.83 3.75 3.75 1.83-1.83z"/></svg>
                </button>
                <button class="menu-btn" onclick="deleteBoard('${board.id}', event)" title="Eliminar">
                  <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M6 19c0 1.1.9 2 2 2h8c1.1 0 2-.9 2-2V7H6v12zM19 4h-3.5l-1-1h-5l-1 1H5v2h14V4z"/></svg>
                </button>
              </div>
            </div>
          `;
          grid.appendChild(card);
        });
      });
    }
// REGISTRO DEL SERVICE WORKER PARA LA PWA
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('./sw.js')
        .then(() => console.log('Service Worker registrado correctamente desde el Dashboard'))
        .catch(err => console.warn('Error al registrar Service Worker', err));
    }
    loadBoards();
  </script>
</body>
</html>
